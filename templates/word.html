<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon Engine | Word Unscrambler</title>
    <link rel="canonical" href="https://cipher-studio-2.onrender.com/word-unscrambler" />
    <style>
        body {
            background-color: #0b0b0b;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            letter-spacing: 2px;
        }
        form {
            background: #121212;
            border: 1px solid #222;
            padding: 30px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }
        input[type="text"] {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 4px;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 2px;
        }
        input[type="text"]:focus {
            border-color: #d4af37;
            outline: none;
        }
        button {
            background: #d4af37;
            color: #0b0b0b;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #fff;
        }
        .results {
            margin-top: 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .word-badge {
            display: inline-block;
            background: #121212;
            border: 1px solid #d4af37;
            color: #fff;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 20px;
            font-weight: 500;
        }
        .back-link {
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #d4af37;
        }
        
        /* Monetag SmartLink Button Styling */
        .ad-container {
            margin-top: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .ad-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #121212;
            color: #d4af37;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            border: 1px solid #d4af37;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.1);
            transition: all 0.3s ease;
        }
        .ad-link:hover {
            background-color: #d4af37;
            color: #0b0b0b;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <h2>WORD UNSCRAMBLER</h2>
    
    <form method="POST">
        <label for="letters" style="color: #888; text-align: center;">Enter your jumbled letters:</label>
        <input type="text" id="letters" name="letters" placeholder="e.g., tca" required autocomplete="off">
        <button type="submit">DECRYPT LETTERS</button>
    </form>

    <div class="results">
        {% if results is not none %}
            <h3 style="color: #fff;">Discovered Matches:</h3>
            {% if results %}
                {% for word in results %}
                    <span class="word-badge">{{ word }}</span>
                {% endfor %}
            {% else %}
                <p style="color: #cc0000;">No pristine words found in database.</p>
            {% endif %}
        {% endif %}
    </div>

    <!-- Monetag SmartLink Support Button -->
    <div class="ad-container">
        <p style="color: #666; font-size: 0.85rem; margin-bottom: 10px; letter-spacing: 1px;">HELP KEEP ENGINE ONLINE</p>
        <a href="https://omg10.com/4/11239340" target="_blank" class="ad-link">
            👉 Support Cipher Studio
        </a>
    </div>

    <a href="/" class="back-link">← Return to Studio</a>

</body>
</html>
